<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GFII Onboarding</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    body { font-family: 'Segoe UI', sans-serif; background: #f2f5f7; display: flex; justify-content: center; align-items: center; height: 100vh; }
    main { background: #fff; padding: 2rem; border-radius: 10px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 400px; }
    input, textarea, button { width: 100%; margin-bottom: 1rem; padding: 0.75rem; font-size: 1rem; border-radius: 6px; border: 1px solid #ccc; }
    button { background: #4a90e2; color: white; border: none; cursor: pointer; }
    button:hover { background: #357ABD; }
    .message { text-align: center; margin-bottom: 1rem; padding: 0.75rem; border-radius: 6px; }
    .message.error { background: #fdecea; color: #b22222; }
    .message.success { background: #e6f4ea; color: #2d7a46; }
  </style>
</head>
<body>
<main>
  <h2>Welcome! Complete Your Profile</h2>
  <div id="message" class="message" hidden></div>
  <form id="onboarding-form">
    <input type="text" id="name" placeholder="Full Name" required>
    <textarea id="statement" placeholder="Your Statement / Bio" required></textarea>
    <input type="text" id="focus" placeholder="Your Focus / Area of Expertise" required>
    <button type="submit">Complete Onboarding</button>
  </form>
</main>

<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';

const supabase = createClient(
  'https://adkljqadhghboezfazxz.supabase.co',
  'sb_publishable_cEo9AM4ZL0T21rG-Fn1RlA_u2nW5vj6'
);

const form = document.getElementById('onboarding-form');
const messageEl = document.getElementById('message');

function showMessage(text, type='error') {
  messageEl.textContent = text;
  messageEl.className = 'message ' + type;
  messageEl.hidden = false;
}

// ---------------- AUTH CHECK ----------------
let currentUser;
async function init() {
  const { data: { session } } = await supabase.auth.getSession();

  if (!session) {
    location.href = '/login.html';
    return;
  }

  currentUser = session.user;

  // Optional: check if onboarding is already done
  const { data: profile } = await supabase
    .from('profiles')
    .select('onboarding_complete')
    .eq('id', currentUser.id)
    .maybeSingle();

  if (profile?.onboarding_complete) {
    window.location.href = '/portal.html';
  }
}
init();

// ---------------- FORM SUBMIT ----------------
form.addEventListener('submit', async (e) => {
  e.preventDefault();

  const name = document.getElementById('name').value.trim();
  const statement = document.getElementById('statement').value.trim();
  const focus = document.getElementById('focus').value.trim();

  if (!name || !statement || !focus) {
    showMessage("All fields are required.");
    return;
  }

  try {
    const { data, error } = await supabase
      .from('profiles')
      .upsert([{
        id: currentUser.id,
        name,
        statement,
        focus,
        onboarding_complete: true
      }], { onConflict: 'id' });

    if (error) throw error;

    showMessage("Onboarding complete! Redirecting…", "success");
    setTimeout(() => window.location.href = '/portal.html', 1000);

  } catch (err) {
    console.error("Onboarding error:", err);
    showMessage("Failed to complete onboarding: " + err.message);
  }
});
</script>
</body>
</html>
