<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GFII Onboarding</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <nav class="nav">
    <h1>GFII Onboarding</h1>
    <button id="logout-btn" hidden>Log Out</button>
  </nav>

  <main>
    <h2>Complete Your Identity</h2>
    <p>Fill in the details below to enter the portal.</p>

    <form id="onboarding-form">
      <input id="name" placeholder="Full Name" required /><br><br>

      <input id="alias" placeholder="Alias (optional)" /><br><br>

      <textarea id="statement" placeholder="What are you becoming?" required></textarea><br><br>

      <select id="focus" required>
        <option value="">Select Focus</option>
        <option>Building</option>
        <option>Learning</option>
        <option>Networking</option>
      </select><br><br>

      <button type="submit">Enter GFII</button>
      <p id="form-message" class="message" hidden></p>
    </form>
  </main>

  <script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';

    const supabaseUrl = 'https://adkljqadhghboezfazxz.supabase.co';
    const supabaseKey = 'sb_publishable_cEo9AM4ZL0T21rG-Fn1RlA_u2nW5vj6';
    const supabase = createClient(supabaseUrl, supabaseKey);

    const form = document.getElementById('onboarding-form');
    const msg = document.getElementById('form-message');
    const logoutBtn = document.getElementById('logout-btn');

    function showMessage(text, type = 'info') {
      msg.textContent = text;
      msg.className = 'message ' + type;
      msg.hidden = false;
    }

    // Show logout button if logged in
    const session = await supabase.auth.getSession();
    const user = session.data.session?.user;
    if (!user) {
      location.href = '/login.html';
    } else {
      logoutBtn.hidden = false;
    }

    logoutBtn.addEventListener('click', async () => {
      await supabase.auth.signOut();
      location.href = '/login.html';
    });

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      msg.hidden = true;

      const body = {
        name: form.name.value.trim(),
        alias: form.alias.value.trim() || null,
        statement: form.statement.value.trim(),
        focus: form.focus.value
      };

      try {
        const token = (await supabase.auth.getSession()).data.session.access_token;

        const res = await fetch('/.netlify/functions/completeOnboarding', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${token}`
          },
          body: JSON.stringify(body)
        });

        const data = await res.json();

        if (!res.ok) {
          showMessage(data.message || 'Failed to complete onboarding.', 'error');
          return;
        }

        showMessage('Onboarding completed! Redirecting…', 'success');
        setTimeout(() => location.href = '/portal.html', 1500);

      } catch (err) {
        console.error(err);
        showMessage('Unexpected error occurred.', 'error');
      }
    });
  </script>

</body>
</html>
