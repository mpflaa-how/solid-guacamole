<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>GFII — Dashboard</title>
<link rel="stylesheet" href="styles.css">

<style>

/* =============================
   APP LAYOUT
============================= */

body{
  margin:0;
  background:#0b0c0f;
  color:#fff;
  font-family:Segoe UI,system-ui;
}

.app{
  display:grid;
  grid-template-columns:240px 1fr;
  min-height:100vh;
}

/* =============================
   SIDEBAR
============================= */

.sidebar{
  background:#0f1116;
  border-right:1px solid rgba(255,255,255,.05);
  padding:28px 20px;
}

.brand{
  font-size:1.3rem;
  letter-spacing:2px;
  margin-bottom:40px;
  color:#c9a96e;
}

.nav-link{
  display:block;
  padding:12px;
  margin-bottom:6px;
  border-radius:8px;
  color:#aaa;
  text-decoration:none;
  transition:.25s;
}

.nav-link:hover,
.nav-link.active{
  background:rgba(201,169,110,.12);
  color:#fff;
}

/* =============================
   MAIN
============================= */

.main{
  padding:40px;
}

.topbar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:30px;
}

.logout{
  background:none;
  border:1px solid rgba(255,255,255,.2);
  color:#fff;
  padding:8px 14px;
  border-radius:6px;
  cursor:pointer;
}

/* =============================
   GRID
============================= */

.dashboard{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(320px,1fr));
  gap:24px;
}

.card{
  background:rgba(255,255,255,.03);
  border:1px solid rgba(255,255,255,.05);
  border-radius:14px;
  padding:22px;
  backdrop-filter:blur(8px);
}

.card h3{
  font-size:.8rem;
  letter-spacing:2px;
  color:#c9a96e;
  margin-bottom:18px;
  text-transform:uppercase;
}

/* =============================
   PROFILE
============================= */

.profile-name{
  font-size:1.5rem;
  font-weight:600;
}

.profile-statement{
  color:#aaa;
  margin:10px 0;
}

.badge{
  display:inline-block;
  background:rgba(201,169,110,.15);
  color:#c9a96e;
  padding:6px 10px;
  border-radius:6px;
  font-size:.8rem;
}

/* =============================
   MEMBERS
============================= */

.member{
  padding:10px 0;
  border-bottom:1px solid rgba(255,255,255,.05);
}

.member:last-child{border:none;}

.member strong{color:#fff;}
.member p{color:#888;margin:4px 0;}

.member a{
  font-size:.8rem;
  color:#c9a96e;
  text-decoration:none;
}

/* =============================
   STATUS
============================= */

.status-box{
  color:#bbb;
  line-height:1.7;
}

</style>
</head>

<body>

<div class="app">

<!-- SIDEBAR -->
<aside class="sidebar">
  <div class="brand">GFII</div>

  <a class="nav-link active" href="/dashboard.html">Dashboard</a>
  <a class="nav-link" href="/profile.html">Profile</a>
  <a class="nav-link" href="/members.html">Members</a>
  <a class="nav-link" href="/settings.html">Settings</a>
</aside>

<!-- MAIN -->
<div class="main">

  <div class="topbar">
    <h2>Member Dashboard</h2>
    <button id="logout-btn" class="logout" hidden>Logout</button>
  </div>

  <div class="dashboard">

    <section class="card">
      <h3>Your Identity</h3>
      <div id="profile"></div>
    </section>

    <section class="card">
      <h3>Status</h3>
      <div id="status"></div>
    </section>

    <section class="card">
      <h3>Members</h3>
      <div id="members"></div>
    </section>

    <section class="card">
      <h3>Access</h3>
      <div class="status-box">
        ✔ Approved Member<br>
        ✔ Profile Initialized<br><br>
        New capabilities unlock progressively.
      </div>
    </section>

  </div>

</div>
</div>

<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';

/* =============================
   SUPABASE
============================= */

const supabase = createClient(
'https://adkljqadhghboezfazxz.supabase.co',
'sb_publishable_cEo9AM4ZL0T21rG-Fn1RlA_u2nW5vj6'
);

const logoutBtn=document.getElementById('logout-btn');
const profileEl=document.getElementById('profile');
const statusEl=document.getElementById('status');
const membersEl=document.getElementById('members');

let user;

/* =============================
   SAFE REDIRECT
============================= */

const go=(p)=>location.replace(p);

/* =============================
   INIT
============================= */

async function init(){

const {data:{session}}=await supabase.auth.getSession();

if(!session) return go('/login.html');

user=session.user;

/* approval */
const {data:approved}=await supabase
.from('approved_users')
.select('user_id')
.eq('user_id',user.id)
.maybeSingle();

if(!approved) return go('/not-approved.html');

/* profile */
const {data:profile}=await supabase
.from('profiles')
.select('*')
.eq('id',user.id)
.maybeSingle();

if(!profile || !profile.onboarding_complete)
return go('/onboarding.html');

renderProfile(profile);
renderStatus(profile);
loadMembers();

logoutBtn.hidden=false;
}

/* =============================
   RENDER
============================= */

function renderProfile(p){
profileEl.innerHTML=`
<div class="profile-name">${p.name}</div>
<div class="profile-statement">${p.statement||''}</div>
<div class="badge">${p.focus||'Member'}</div>
`;
}

function renderStatus(p){
statusEl.innerHTML=`
<div class="status-box">
<strong>Alias:</strong> ${p.alias||'Not set'}<br>
<strong>Focus:</strong> ${p.focus||'—'}<br>
<strong>Member Since:</strong>
${new Date(p.created_at).toLocaleDateString()}
</div>
`;
}

/* =============================
   MEMBERS
============================= */

async function loadMembers(){

const {data:members}=await supabase
.from('profiles')
.select('id,name,focus')
.neq('id',user.id)
.limit(5);

if(!members?.length){
membersEl.innerHTML='<p>No members yet.</p>';
return;
}

membersEl.innerHTML=members.map(m=>`
<div class="member">
<strong>${m.name}</strong>
<p>${m.focus||''}</p>
<a href="/profile.html?id=${m.id}">View</a>
</div>
`).join('');
}

/* =============================
   LOGOUT
============================= */

logoutBtn.onclick=async()=>{
await supabase.auth.signOut();
go('/login.html');
};

/* session listener */
supabase.auth.onAuthStateChange(e=>{
if(e==='SIGNED_OUT') go('/login.html');
});

init();
</script>

</body>
</html>
