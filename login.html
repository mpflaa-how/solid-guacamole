<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GFII Login</title>
  <link rel="stylesheet" href="styles.css">
</head>

<body>

<nav class="nav">
  <h1 class="nav-brand">GFII</h1>
  <div class="nav-links">
    <a href="/">Home</a>
    <a href="/apply.html">Apply</a>
  </div>
</nav>

<main style="max-width: 420px; margin: 80px auto 0;">

  <h2 style="text-align:center;">Member Access</h2>
  <p style="text-align:center; color:#888;">
    Private entry for approved members only.
  </p>

  <div id="auth-message" class="message" hidden></div>

  <!-- LOGIN -->
  <form id="login-form" class="auth-form">
    <input id="login-email" type="email" placeholder="Email" required>
    <input id="login-password" type="password" placeholder="Password" required>

    <button type="submit">Enter</button>

    <p class="auth-links">
      <a href="#" id="show-recovery">Forgot password?</a>
    </p>
  </form>

  <!-- RECOVERY -->
  <form id="recovery-form" class="auth-form" hidden>
    <input id="recovery-email" type="email" placeholder="Email" required>
    <button type="submit">Send Reset Link</button>

    <p class="auth-links">
      <a href="#" id="show-login">Back to login</a>
    </p>
  </form>

  <!-- RESET -->
  <form id="reset-form" class="auth-form" hidden>
    <input id="reset-password" type="password" placeholder="New Password" required minlength="6">
    <button type="submit">Update Password</button>
  </form>

</main>

<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';

const supabase = createClient(
  'https://adkljqadhghboezfazxz.supabase.co',
  'sb_publishable_cEo9AM4ZL0T21rG-Fn1RlA_u2nW5vj6'
);

const loginForm = document.getElementById('login-form');
const recoveryForm = document.getElementById('recovery-form');
const resetForm = document.getElementById('reset-form');
const msg = document.getElementById('auth-message');

function showMessage(text, type='info') {
  msg.textContent = text;
  msg.className = 'message ' + type;
  msg.hidden = false;
}

function hideAllForms() {
  loginForm.hidden = true;
  recoveryForm.hidden = true;
  resetForm.hidden = true;
  msg.hidden = true;
}

// ---------------- LOGIN ----------------
loginForm.addEventListener('submit', async (e) => {
  e.preventDefault();

  const email = document.getElementById('login-email').value.toLowerCase().trim();
  const password = document.getElementById('login-password').value;
  const btn = loginForm.querySelector('button');

  btn.disabled = true;
  btn.textContent = 'Entering…';
  msg.hidden = true;

  try {
    const { data, error } = await supabase.auth.signInWithPassword({ email, password });
    if (error) throw error;

    if (!data.user.email_confirmed_at) {
      showMessage('Please confirm your email first.', 'error');
      btn.disabled = false;
      btn.textContent = 'Enter';
      return;
    }

    // ✅ Approval check (case safe)
    const { data: approved } = await supabase
      .from('approved_users')
      .select('email')
      .ilike('email', email)
      .maybeSingle();

    if (!approved) {
      await supabase.auth.signOut();
      showMessage('You are not approved yet.', 'error');
      btn.disabled = false;
      btn.textContent = 'Enter';
      return;
    }

    window.location.href = '/portal.html';

  } catch (err) {
    showMessage(err.message || 'Login failed.', 'error');
    btn.disabled = false;
    btn.textContent = 'Enter';
  }
});

// ---------------- RECOVERY ----------------
recoveryForm.addEventListener('submit', async (e) => {
  e.preventDefault();

  const email = document.getElementById('recovery-email').value;
  const btn = recoveryForm.querySelector('button');

  btn.disabled = true;

  try {
    const { error } = await supabase.auth.resetPasswordForEmail(email, {
      redirectTo: window.location.origin + '/login.html'
    });

    if (error) throw error;

    showMessage('Recovery email sent.', 'success');

  } catch (err) {
    showMessage(err.message || 'Failed to send email.', 'error');
  }

  btn.disabled = false;
});

// ---------------- RESET ----------------
resetForm.addEventListener('submit', async (e) => {
  e.preventDefault();

  const password = document.getElementById('reset-password').value;
  const btn = resetForm.querySelector('button');

  btn.disabled = true;
  btn.textContent = 'Updating…';

  try {
    const { error } = await supabase.auth.updateUser({ password });
    if (error) throw error;

    showMessage('Password updated. Redirecting…', 'success');
    setTimeout(() => location.href = '/login.html', 1500);

  } catch (err) {
    showMessage(err.message || 'Update failed.', 'error');
    btn.disabled = false;
    btn.textContent = 'Update Password';
  }
});

// ---------------- TOGGLES ----------------
document.getElementById('show-recovery').onclick = (e) => {
  e.preventDefault();
  hideAllForms();
  recoveryForm.hidden = false;
};

document.getElementById('show-login').onclick = (e) => {
  e.preventDefault();
  hideAllForms();
  loginForm.hidden = false;
};

// ---------------- AUTO SESSION ----------------
supabase.auth.getSession().then(async ({ data }) => {
  if (!data.session) return;

  const email = data.session.user.email.toLowerCase().trim();

  const { data: approved } = await supabase
    .from('approved_users')
    .select('email')
    .ilike('email', email)
    .maybeSingle();

  if (approved) location.href = '/portal.html';
});
</script>

</body>
</html>
