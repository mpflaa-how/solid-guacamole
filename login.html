<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GFII Login</title>
  <style>
    /* Reset & base */
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
    body { background: #f2f5f7; color: #333; display: flex; justify-content: center; align-items: center; height: 100vh; }
    main { background: #fff; padding: 2.5rem; border-radius: 10px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 400px; }

    h2 { margin-bottom: 0.5rem; color: #1a1a1a; text-align: center; }
    p { margin-bottom: 1.5rem; text-align: center; color: #555; }

    .auth-form { display: flex; flex-direction: column; gap: 1rem; }
    input[type="email"], input[type="password"] { padding: 0.75rem 1rem; border-radius: 6px; border: 1px solid #ccc; font-size: 1rem; }
    input[type="email"]:focus, input[type="password"]:focus { outline: none; border-color: #4a90e2; box-shadow: 0 0 0 2px rgba(74,144,226,0.2); }

    button { padding: 0.75rem; border: none; border-radius: 6px; background: #4a90e2; color: #fff; font-size: 1rem; cursor: pointer; transition: 0.2s; }
    button:hover { background: #357ABD; }

    .auth-links { font-size: 0.9rem; text-align: center; margin-top: 0.5rem; }
    .auth-links a { color: #4a90e2; text-decoration: none; margin: 0 0.25rem; }
    .auth-links a:hover { text-decoration: underline; }

    .message { padding: 0.75rem 1rem; border-radius: 6px; margin-bottom: 1rem; text-align: center; font-size: 0.95rem; }
    .message.info { background: #e7f3ff; color: #3178c6; }
    .message.success { background: #e6f4ea; color: #2d7a46; }
    .message.error { background: #fdecea; color: #b22222; }

    form[hidden] { display: none; }
  </style>
</head>
<body>

<main>
  <h2>GFII Member Login</h2>
  <p>Access is available to approved members only.</p>

  <div id="auth-message" class="message" hidden></div>

  <!-- Login Form -->
  <form id="login-form" class="auth-form">
    <input id="login-email" type="email" placeholder="Email" required>
    <input id="login-password" type="password" placeholder="Password" required>
    <button type="submit">Log In</button>
    <p class="auth-links">
      <a href="#" id="show-recovery">Forgot password?</a> &middot;
      <a href="/">Home</a>
    </p>
  </form>

  <!-- Recovery Form -->
  <form id="recovery-form" class="auth-form" hidden>
    <input id="recovery-email" type="email" placeholder="Email" required>
    <button type="submit">Send Recovery Email</button>
    <p class="auth-links">
      <a href="#" id="show-login">Back to login</a>
    </p>
  </form>

  <!-- Reset Form -->
  <form id="reset-form" class="auth-form" hidden>
    <p style="text-align:center;">Set your new password:</p>
    <input id="reset-password" type="password" placeholder="New Password" required minlength="6">
    <button type="submit">Update Password</button>
  </form>
</main>

<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';

const supabaseUrl = 'https://adkljqadhghboezfazxz.supabase.co';
const supabaseKey = 'sb_publishable_cEo9AM4ZL0T21rG-Fn1RlA_u2nW5vj6';
const supabase = createClient(supabaseUrl, supabaseKey);

const loginForm = document.getElementById('login-form');
const recoveryForm = document.getElementById('recovery-form');
const resetForm = document.getElementById('reset-form');
const msg = document.getElementById('auth-message');

function showMessage(text, type='info') {
  msg.textContent = text;
  msg.className = 'message ' + type;
  msg.hidden = false;
}

function hideAllForms() {
  loginForm.hidden = true;
  recoveryForm.hidden = true;
  resetForm.hidden = true;
  msg.hidden = true;
}

// ---------------- Login ----------------
loginForm.addEventListener('submit', async (e) => {
  e.preventDefault();
  const email = document.getElementById('login-email').value;
  const password = document.getElementById('login-password').value;
  const btn = loginForm.querySelector('button');
  btn.disabled = true;
  btn.textContent = 'Logging in…';
  msg.hidden = true;

  try {
    const { data, error } = await supabase.auth.signInWithPassword({ email, password });
    if (error) throw error;

    if (!data.user.email_confirmed_at) {
      showMessage('Please confirm your email before logging in.', 'error');
      btn.disabled = false; btn.textContent = 'Log In';
      return;
    }

    const { data: approved, error: approvalError } = await supabase
      .from('approved_users')
      .select('email')
      .eq('email', email)
      .limit(1);

    if (approvalError) throw approvalError;
    if (!approved.length) {
      showMessage('You are not yet approved to access the portal.', 'error');
      await supabase.auth.signOut();
      btn.disabled = false; btn.textContent = 'Log In';
      return;
    }

    window.location.href = '/portal.html';
  } catch (err) {
    showMessage(err.message || 'Login failed. Check your credentials.', 'error');
    btn.disabled = false;
    btn.textContent = 'Log In';
  }
});

// ---------------- Recovery ----------------
recoveryForm.addEventListener('submit', async (e) => {
  e.preventDefault();
  const email = document.getElementById('recovery-email').value;
  const btn = recoveryForm.querySelector('button');
  btn.disabled = true;

  try {
    const { error } = await supabase.auth.resetPasswordForEmail(email, { redirectTo: window.location.origin + '/login.html' });
    if (error) throw error;
    showMessage('Check your email for a recovery link.', 'success');
  } catch (err) {
    showMessage(err.message || 'Could not send recovery email.', 'error');
  }

  btn.disabled = false;
});

// ---------------- Password reset ----------------
resetForm.addEventListener('submit', async (e) => {
  e.preventDefault();
  const password = document.getElementById('reset-password').value;
  const btn = resetForm.querySelector('button');
  btn.disabled = true;
  btn.textContent = 'Updating…';

  try {
    const { error } = await supabase.auth.updateUser({ password });
    if (error) throw error;

    showMessage('Password updated! Redirecting…', 'success');
    setTimeout(() => window.location.href = '/login.html', 1500);
  } catch (err) {
    showMessage(err.message || 'Could not update password.', 'error');
    btn.disabled = false;
    btn.textContent = 'Update Password';
  }
});

// ---------------- Form toggles ----------------
document.getElementById('show-recovery').addEventListener('click', (e) => {
  e.preventDefault(); hideAllForms(); recoveryForm.hidden = false;
});
document.getElementById('show-login').addEventListener('click', (e) => {
  e.preventDefault(); hideAllForms(); loginForm.hidden = false;
});

// ---------------- Auto-redirect if already logged in ----------------
supabase.auth.getSession().then(({ data }) => {
  if (data.session) {
    const email = data.session.user.email;
    supabase.from('approved_users').select('email').eq('email', email).then(({ data: approved }) => {
      if (approved.length) window.location.href = '/portal.html';
    });
  }
});
</script>

</body>
</html>
