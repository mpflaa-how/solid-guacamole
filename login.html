<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GFII Login</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<main>
  <h2>Member Login</h2>
  <p>Access is available to accepted members only.</p>

  <div id="auth-message" class="message" hidden></div>

  <form id="login-form" class="auth-form">
    <input id="login-email" type="email" placeholder="Email" required>
    <input id="login-password" type="password" placeholder="Password" required>
    <button type="submit">Log In</button>
    <p class="auth-links">
      <a href="#" id="show-recovery">Forgot password?</a>
      &middot;
      <a href="/">Home</a>
    </p>
  </form>

  <form id="recovery-form" class="auth-form" hidden>
    <input id="recovery-email" type="email" placeholder="Email" required>
    <button type="submit">Send Recovery Email</button>
    <p class="auth-links">
      <a href="#" id="show-login">Back to login</a>
    </p>
  </form>

  <form id="reset-form" class="auth-form" hidden>
    <p>Set your new password:</p>
    <input id="reset-password" type="password" placeholder="New Password" required minlength="6">
    <button type="submit">Update Password</button>
  </form>
</main>

<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';

const supabaseUrl = 'https://adkljqadhghboezfazxz.supabase.co';
const supabaseKey = 'sb_publishable_cEo9AM4ZL0T21rG-Fn1RlA_u2nW5vj6';
const supabase = createClient(supabaseUrl, supabaseKey);

const loginForm = document.getElementById('login-form');
const recoveryForm = document.getElementById('recovery-form');
const resetForm = document.getElementById('reset-form');
const msg = document.getElementById('auth-message');

function showMessage(text, type='info') {
  msg.textContent = text;
  msg.className = 'message ' + type;
  msg.hidden = false;
}

function hideAllForms() {
  loginForm.hidden = true;
  recoveryForm.hidden = true;
  resetForm.hidden = true;
  msg.hidden = true;
}

// ---------------- Login ----------------
loginForm.addEventListener('submit', async (e) => {
  e.preventDefault();
  const email = document.getElementById('login-email').value;
  const password = document.getElementById('login-password').value;
  const btn = loginForm.querySelector('button');
  btn.disabled = true;
  btn.textContent = 'Logging in…';
  msg.hidden = true;

  try {
    // 1️⃣ Sign in with Supabase
    const { data, error } = await supabase.auth.signInWithPassword({ email, password });
    if (error) throw error;

    // 2️⃣ Check if email is confirmed
    if (!data.user.email_confirmed_at) {
      showMessage('Please confirm your email before logging in.', 'error');
      btn.disabled = false;
      btn.textContent = 'Log In';
      return;
    }

    // 3️⃣ Check if user is approved
    const { data: approved, error: approvalError } = await supabase
      .from('approved_users')
      .select('email')
      .eq('email', email)
      .limit(1);

    if (approvalError) throw approvalError;
    if (!approved.length) {
      showMessage('You are not yet approved to access the portal.', 'error');
      await supabase.auth.signOut(); // prevent access
      btn.disabled = false;
      btn.textContent = 'Log In';
      return;
    }

    // ✅ Success: redirect
    window.location.href = '/portal.html';

  } catch (err) {
    showMessage(err.message || 'Login failed. Check your credentials.', 'error');
    btn.disabled = false;
    btn.textContent = 'Log In';
  }
});

// ---------------- Recovery ----------------
recoveryForm.addEventListener('submit', async (e) => {
  e.preventDefault();
  const email = document.getElementById('recovery-email').value;
  const btn = recoveryForm.querySelector('button');
  btn.disabled = true;

  try {
    const { error } = await supabase.auth.resetPasswordForEmail(email, {
      redirectTo: window.location.origin + '/login.html'
    });
    if (error) throw error;
    showMessage('Check your email for a recovery link.', 'success');
  } catch (err) {
    showMessage(err.message || 'Could not send recovery email.', 'error');
  }

  btn.disabled = false;
});

// ---------------- Password reset ----------------
resetForm.addEventListener('submit', async (e) => {
  e.preventDefault();
  const password = document.getElementById('reset-password').value;
  const btn = resetForm.querySelector('button');
  btn.disabled = true;
  btn.textContent = 'Updating…';

  try {
    const { error } = await supabase.auth.updateUser({ password });
    if (error) throw error;

    showMessage('Password updated! Redirecting…', 'success');
    setTimeout(() => window.location.href = '/login.html', 1500);
  } catch (err) {
    showMessage(err.message || 'Could not update password.', 'error');
    btn.disabled = false;
    btn.textContent = 'Update Password';
  }
});

// ---------------- Form toggles ----------------
document.getElementById('show-recovery').addEventListener('click', (e) => {
  e.preventDefault();
  hideAllForms();
  recoveryForm.hidden = false;
});

document.getElementById('show-login').addEventListener('click', (e) => {
  e.preventDefault();
  hideAllForms();
  loginForm.hidden = false;
});

// ---------------- Auto-redirect if already logged in ----------------
supabase.auth.getSession().then(({ data }) => {
  if (data.session) {
    const email = data.session.user.email;
    supabase.from('approved_users').select('email').eq('email', email).then(({ data: approved }) => {
      if (approved.length) window.location.href = '/portal.html';
    });
  }
});
</script>

</body>
</html>
