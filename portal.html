<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';

const supabaseUrl = 'https://adkljqadhghboezfazxz.supabase.co';
const supabaseKey = 'sb_publishable_cEo9AM4ZL0T21rG-Fn1RlA_u2nW5vj6';
const supabase = createClient(supabaseUrl, supabaseKey);

const logoutBtn = document.getElementById('logout-btn');

async function initPortal() {
  const { data: { session } } = await supabase.auth.getSession();

  if (!session) {
    location.href = '/login.html';
    return;
  }

  const email = session.user.email;

  // Check if user is approved
  const { data: approved, error } = await supabase
    .from('approved_users')
    .select('email, onboarding_complete')
    .eq('email', email)
    .single();

  if (error) {
    console.error(error);
    location.href = '/login.html';
    return;
  }

  if (!approved) {
    location.href = '/not-approved.html';
    return;
  }

  if (!approved.onboarding_complete) {
    location.href = '/onboarding.html';
    return;
  }

  // ✅ SUCCESS: show logout button
  logoutBtn.hidden = false;
}

logoutBtn.addEventListener('click', async () => {
  await supabase.auth.signOut();
  location.href = '/login.html';
});

// Initialize
initPortal();
</script>
