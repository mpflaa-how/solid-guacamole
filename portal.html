<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>GFII Portal</title>

<link rel="stylesheet" href="styles.css">

<style>
body{
  margin:0;
  background:#0b0c0f;
  color:#fff;
  font-family:Segoe UI,system-ui;
}

.loader{
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  color:#aaa;
}

.app{
  display:none;
  grid-template-columns:240px 1fr;
  min-height:100vh;
}

/* SIDEBAR */
.sidebar{
  background:#0f1116;
  border-right:1px solid rgba(255,255,255,.05);
  padding:28px 20px;
}

.brand{
  color:#c9a96e;
  letter-spacing:2px;
  margin-bottom:40px;
}

.nav-link{
  display:block;
  padding:12px;
  margin-bottom:6px;
  border-radius:8px;
  color:#aaa;
  text-decoration:none;
}

.nav-link:hover{
  background:rgba(201,169,110,.12);
  color:#fff;
}

/* MAIN */
.main{ padding:40px; }

.dashboard{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(320px,1fr));
  gap:24px;
}

.card{
  background:rgba(255,255,255,.03);
  border:1px solid rgba(255,255,255,.05);
  border-radius:14px;
  padding:22px;
}

.card h3{
  font-size:.8rem;
  letter-spacing:2px;
  color:#c9a96e;
  margin-bottom:18px;
}

.logout{
  background:none;
  border:1px solid rgba(255,255,255,.2);
  color:#fff;
  padding:8px 14px;
  border-radius:6px;
  cursor:pointer;
}
</style>
</head>

<body>

<!-- LOADING SCREEN -->
<div id="loader" class="loader">Entering GFII…</div>

<!-- APP -->
<div id="app" class="app">

<aside class="sidebar">
  <div class="brand">GFII</div>
  <a class="nav-link">Dashboard</a>
  <a class="nav-link">Members</a>
  <a class="nav-link">Settings</a>
</aside>

<div class="main">

<div style="display:flex;justify-content:space-between;margin-bottom:30px;">
<h2>Member Dashboard</h2>
<button id="logout-btn" class="logout">Logout</button>
</div>

<div class="dashboard">

<section class="card">
<h3>Your Identity</h3>
<div id="profile"></div>
</section>

<section class="card">
<h3>Status</h3>
<div id="status"></div>
</section>

<section class="card">
<h3>Members</h3>
<div id="members"></div>
</section>

<section class="card">
<h3>Access</h3>
✔ Approved Member<br>
✔ Profile Initialized<br><br>
New capabilities unlock progressively.
</section>

</div>
</div>
</div>

<script type="module">
import { createClient } from
'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';

/* =============================
   SUPABASE
============================= */

const supabase=createClient(
'https://adkljqadhghboezfazxz.supabase.co',
'sb_publishable_cEo9AM4ZL0T21rG-Fn1RlA_u2nW5vj6'
);

/* DOM */
const loader=document.getElementById('loader');
const app=document.getElementById('app');
const logoutBtn=document.getElementById('logout-btn');

const profileEl=document.getElementById('profile');
const statusEl=document.getElementById('status');
const membersEl=document.getElementById('members');

let user;

/* redirect helper */
const go=(p)=>location.replace(p);

/* =============================
   BOOT PORTAL
============================= */

async function boot(){

const {data:{session}}=
await supabase.auth.getSession();

if(!session){
go('/login.html');
return;
}

user=session.user;

/* approval check */
const {data:approved}=await supabase
.from('approved_users')
.select('user_id')
.eq('user_id',user.id)
.maybeSingle();

if(!approved){
go('/not-approved.html');
return;
}

/* profile check */
const {data:profile}=await supabase
.from('profiles')
.select('*')
.eq('id',user.id)
.maybeSingle();

if(!profile || !profile.onboarding_complete){
go('/onboarding.html');
return;
}

/* render UI */
renderProfile(profile);
renderStatus(profile);
loadMembers();

/* reveal app */
loader.style.display='none';
app.style.display='grid';
}

/* =============================
   RENDER
============================= */

function renderProfile(p){
profileEl.innerHTML=`
<div style="font-size:1.4rem;font-weight:600">${p.name}</div>
<div style="color:#aaa">${p.statement||''}</div>
<div style="color:#c9a96e;margin-top:8px">${p.focus||'Member'}</div>
`;
}

function renderStatus(p){
statusEl.innerHTML=`
Alias: ${p.alias||'—'}<br>
Focus: ${p.focus||'—'}<br>
Member Since:
${new Date(p.created_at).toLocaleDateString()}
`;
}

/* MEMBERS */
async function loadMembers(){

const {data}=await supabase
.from('profiles')
.select('id,name,focus')
.neq('id',user.id)
.limit(5);

if(!data?.length){
membersEl.innerHTML='No members yet.';
return;
}

membersEl.innerHTML=data.map(m=>`
<div style="padding:10px 0;border-bottom:1px solid rgba(255,255,255,.05)">
<strong>${m.name}</strong><br>
<span style="color:#888">${m.focus||''}</span>
</div>
`).join('');
}

/* LOGOUT */
logoutBtn.onclick=async()=>{
await supabase.auth.signOut();
go('/login.html');
};

supabase.auth.onAuthStateChange(e=>{
if(e==='SIGNED_OUT') go('/login.html');
});

boot();
</script>

</body>
</html>
