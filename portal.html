<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>GFII Portal</title>

<link rel="stylesheet" href="styles.css">

<style>

/* ===== APP SHELL ===== */

body{
  margin:0;
  font-family:Segoe UI, sans-serif;
  background:#f4f6f8;
}

.app{
  display:flex;
  height:100vh;
}

/* ===== SIDEBAR ===== */

.sidebar{
  width:240px;
  background:#0f172a;
  color:white;
  padding:22px;
  display:flex;
  flex-direction:column;
}

.logo{
  font-size:20px;
  font-weight:600;
  margin-bottom:28px;
}

.nav button{
  width:100%;
  padding:12px;
  margin:6px 0;
  border:none;
  background:none;
  color:white;
  text-align:left;
  cursor:pointer;
  border-radius:8px;
  transition:.2s;
}

.nav button:hover{
  background:#1e293b;
}

.logout{
  margin-top:auto;
  padding:10px;
  border:none;
  border-radius:8px;
  background:#1e293b;
  color:white;
  cursor:pointer;
}

/* ===== MAIN ===== */

.main{
  flex:1;
  padding:32px;
  overflow:auto;
}

.topbar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:24px;
}

.view{
  display:none;
}

.view.active{
  display:block;
}

/* ===== CARDS ===== */

.card{
  background:white;
  padding:22px;
  border-radius:12px;
  box-shadow:0 4px 12px rgba(0,0,0,.05);
  margin-bottom:20px;
}

</style>
</head>

<body>

<div class="app">

  <!-- SIDEBAR -->
  <aside class="sidebar">

    <div class="logo">GFII</div>

    <div class="nav">
      <button onclick="showView('home')">Home</button>
      <button onclick="showView('members')">Members</button>
      <button onclick="showView('events')">Events</button>
      <button onclick="showView('profile')">Profile</button>
    </div>

    <button id="logoutBtn" class="logout">Logout</button>

  </aside>


  <!-- MAIN -->
  <main class="main">

    <div class="topbar">
      <h2 id="viewTitle">Home</h2>
      <div id="userDisplay">Loading...</div>
    </div>


    <!-- HOME -->
    <section id="home" class="view active">

      <div class="card">
        <h3>Welcome to GFII</h3>
        <p>Your private growth environment.</p>
      </div>

      <div class="card">
        <h3>Status</h3>
        <p>Secure member session active.</p>
      </div>

    </section>


    <!-- MEMBERS -->
    <section id="members" class="view">
      <div class="card">
        <h3>Member Directory</h3>
        <p>Directory connection coming next.</p>
      </div>
    </section>


    <!-- EVENTS -->
    <section id="events" class="view">
      <div class="card">
        <h3>Upcoming Events</h3>
        <ul>
          <li>Weekly Growth Call — Friday</li>
          <li>Founder Session — March 30</li>
        </ul>
      </div>
    </section>


    <!-- PROFILE -->
    <section id="profile" class="view">
      <div class="card">
        <h3>Your Profile</h3>
        <p>Email: <span id="userEmail">—</span></p>
      </div>
    </section>

  </main>

</div>


<!-- =========================
     NETLIFY AUTH (CLEAN)
========================= -->

<script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>

<script>

/* ======================
   VIEW NAVIGATION
====================== */

function showView(id){

  document.querySelectorAll(".view")
    .forEach(v => v.classList.remove("active"));

  document.getElementById(id).classList.add("active");

  document.getElementById("viewTitle").textContent =
    id.charAt(0).toUpperCase() + id.slice(1);
}


/* ======================
   AUTH GATE
====================== */

window.addEventListener("load", () => {

  netlifyIdentity.init();

  netlifyIdentity.on("init", user => {

    // BLOCK ACCESS IF NOT LOGGED IN
    if(!user){
      window.location.href="/login.html";
      return;
    }

    setUser(user);
  });

  netlifyIdentity.on("login", user => {
    setUser(user);
    netlifyIdentity.close();
  });

  netlifyIdentity.on("logout", () => {
    window.location.href="/login.html";
  });

});


/* ======================
   USER DISPLAY
====================== */

function setUser(user){

  document.getElementById("userDisplay").textContent =
    user.user_metadata?.full_name || user.email;

  document.getElementById("userEmail").textContent =
    user.email;
}


/* ======================
   LOGOUT
====================== */

document.getElementById("logoutBtn").onclick = () => {
  netlifyIdentity.logout();
};

</script>

</body>
</html>
