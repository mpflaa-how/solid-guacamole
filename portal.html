<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>GFII Portal</title>

<link rel="stylesheet" href="styles.css">

<style>
/* ===== APP LAYOUT ===== */

body {
  margin:0;
  font-family:Segoe UI, sans-serif;
  background:#f4f6f8;
}

.app {
  display:flex;
  height:100vh;
}

/* SIDEBAR */

.sidebar {
  width:240px;
  background:#0f172a;
  color:white;
  padding:20px;
}

.logo {
  font-size:20px;
  font-weight:600;
  margin-bottom:30px;
}

.nav button {
  width:100%;
  margin:6px 0;
  padding:12px;
  background:none;
  border:none;
  color:white;
  text-align:left;
  cursor:pointer;
  border-radius:8px;
}

.nav button:hover {
  background:#1e293b;
}

/* MAIN AREA */

.main {
  flex:1;
  padding:30px;
  overflow:auto;
}

.view {
  display:none;
}

.view.active {
  display:block;
}

/* CARDS */

.card {
  background:white;
  padding:20px;
  border-radius:12px;
  box-shadow:0 4px 12px rgba(0,0,0,.05);
  margin-bottom:20px;
}

/* HEADER */

.topbar {
  display:flex;
  justify-content:space-between;
  margin-bottom:20px;
}

.user {
  font-weight:500;
}
</style>
</head>

<body>

<div class="app">

  <!-- SIDEBAR -->
  <div class="sidebar">
    <div class="logo">GFII</div>

    <div class="nav">
      <button onclick="showView('home')">Home</button>
      <button onclick="showView('members')">Members</button>
      <button onclick="showView('events')">Events</button>
      <button onclick="showView('profile')">Profile</button>
    </div>

    <hr style="margin:20px 0; opacity:.2">

    <div data-netlify-identity-menu></div>
  </div>

  <!-- MAIN CONTENT -->
  <div class="main">

    <div class="topbar">
      <h2 id="viewTitle">Home</h2>
      <div class="user" id="userDisplay">Guest</div>
    </div>

    <!-- HOME / DASHBOARD -->
    <div id="home" class="view active">

      <div class="card">
        <h3>Welcome to GFII</h3>
        <p>Your private growth environment.</p>
      </div>

      <div class="card">
        <h3>Quick Stats</h3>
        <p>Members Online: 12</p>
        <p>Upcoming Events: 3</p>
      </div>

    </div>

    <!-- MEMBERS -->
    <div id="members" class="view">
      <div class="card">
        <h3>Member Directory</h3>
        <p>(Future database connection)</p>
      </div>
    </div>

    <!-- EVENTS -->
    <div id="events" class="view">
      <div class="card">
        <h3>Upcoming Events</h3>
        <ul>
          <li>Weekly Growth Call — Friday</li>
          <li>Founder Session — March 30</li>
        </ul>
      </div>
    </div>

    <!-- PROFILE -->
    <div id="profile" class="view">
      <div class="card">
        <h3>Your Profile</h3>
        <p>Email: <span id="userEmail">—</span></p>
      </div>
    </div>

  </div>
</div>

<!-- Netlify Identity -->
<script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>

<script>

/* ======================
   VIEW NAVIGATION
====================== */

function showView(id) {

  document.querySelectorAll(".view")
    .forEach(v => v.classList.remove("active"));

  document.getElementById(id).classList.add("active");

  document.getElementById("viewTitle").innerText =
    id.charAt(0).toUpperCase() + id.slice(1);
}

/* ======================
   AUTH HANDLING
====================== */

if (window.netlifyIdentity) {

  netlifyIdentity.on("init", user => {
    updateUser(user);
  });

  netlifyIdentity.on("login", user => {
    updateUser(user);
    netlifyIdentity.close();
  });

  netlifyIdentity.on("logout", () => {
    updateUser(null);
  });
}

function updateUser(user) {

  if (!user) {
    document.getElementById("userDisplay").innerText = "Guest";
    document.getElementById("userEmail").innerText = "—";
    return;
  }

  document.getElementById("userDisplay").innerText =
    user.user_metadata?.full_name || user.email;

  document.getElementById("userEmail").innerText =
    user.email;
}

</script>

</body>
</html>
