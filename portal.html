<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GFII Portal</title>

<link rel="stylesheet" href="styles.css">
</head>

<body>

<!-- NAV -->
<nav class="nav">
  <div class="nav-brand">GFII</div>

  <div class="nav-links">
    <a href="#" onclick="showView('home')">Home</a>
    <a href="#" onclick="showView('members')">Members</a>
    <a href="#" onclick="showView('events')">Events</a>
    <a href="#" onclick="showView('profile')">Profile</a>
    <button class="btn-logout" id="logoutBtn">Logout</button>
  </div>
</nav>

<main>

<h2 id="viewTitle">Home</h2>

<!-- HOME -->
<section id="home" class="view">
  <div class="portal-grid">

    <div class="card">
      <h3>Welcome</h3>
      <p>Private member environment.</p>
    </div>

    <div class="card">
      <h3>Status</h3>
      <p id="statusText">Loading...</p>
    </div>

  </div>
</section>

<!-- MEMBERS -->
<section id="members" class="view" hidden>
  <div class="card">
    <h3>Members</h3>
    <div id="memberList">Loading members...</div>
  </div>
</section>

<!-- EVENTS -->
<section id="events" class="view" hidden>
  <div class="card">
    <h3>Events</h3>
    <ul>
      <li>Weekly Growth Call</li>
      <li>Founder Session</li>
    </ul>
  </div>
</section>

<!-- PROFILE -->
<section id="profile" class="view" hidden>
  <div class="card">
    <h3>Your Profile</h3>
    <p>Email: <span id="userEmail">—</span></p>
    <p>Role: <span id="userRole">—</span></p>
  </div>
</section>

</main>

<script type="module">

import { createClient }
from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';

const supabase = createClient(
  "https://adkljqadhghboezfazxz.supabase.co",
  "sb_publishable_cEo9AM4ZL0T21rG-Fn1RlA_u2nW5vj6"
);

/* ======================
   VIEW NAV
====================== */

window.showView = function(id){

  document.querySelectorAll(".view")
    .forEach(v => v.hidden = true);

  document.getElementById(id).hidden = false;

  viewTitle.textContent =
    id.charAt(0).toUpperCase()+id.slice(1);
}

/* ======================
   INIT PORTAL
====================== */

async function init(){

  const { data:{ session } }
    = await supabase.auth.getSession();

  // Not logged in
  if(!session){
    location.href="/login.html";
    return;
  }

  const user = session.user;
  userEmail.textContent = user.email;

  await ensureProfile(user);

  const profile = await loadProfile(user.id);

  // APPROVAL GATE
  if(!profile.approved){
    document.body.innerHTML = `
      <main style="text-align:center;margin-top:80px">
        <h2>Application Under Review</h2>
        <p>Access unlocks after approval.</p>
      </main>
    `;
    return;
  }

  userRole.textContent = profile.role || "member";
  statusText.textContent = "Access granted";

  loadMembers(user.id);
}

/* ======================
   CREATE PROFILE
====================== */

async function ensureProfile(user){

  const { data } = await supabase
    .from("profiles")
    .select("id")
    .eq("id", user.id)
    .maybeSingle();

  if(!data){
    await supabase.from("profiles").insert({
      id:user.id,
      email:user.email
    });
  }
}

/* ======================
   LOAD PROFILE
====================== */

async function loadProfile(id){

  const { data } = await supabase
    .from("profiles")
    .select("*")
    .eq("id", id)
    .single();

  return data;
}

/* ======================
   MEMBER DIRECTORY
====================== */

async function loadMembers(currentId){

  const { data } = await supabase
    .from("profiles")
    .select("name,focus")
    .eq("approved", true)
    .neq("id", currentId);

  const list = document.getElementById("memberList");

  list.innerHTML = "";

  data?.forEach(m=>{
    list.innerHTML += `
      <p><strong>${m.name || "Member"}</strong>
      — ${m.focus || ""}</p>
    `;
  });
}

/* ======================
   LOGOUT
====================== */

logoutBtn.onclick = async ()=>{
  await supabase.auth.signOut();
  location.href="/login.html";
};

init();

</script>

</body>
</html>
