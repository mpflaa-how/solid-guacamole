<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GFII Portal</title>
  <link rel="stylesheet" href="styles.css">
</head>

<body>

<nav class="nav">
  <h1>GFII</h1>
  <button id="logout-btn" class="btn-logout" hidden>Log Out</button>
</nav>

<main class="portal-grid">

  <!-- LEFT: Profile -->
  <section class="card" id="profile-section">
    <h3>Your Profile</h3>
    <div id="profile"></div>
  </section>

  <!-- CENTER: Feed -->
  <section class="card" id="feed-section">
    <h3>Feed</h3>

    <!-- Post Composer -->
    <form id="post-form">
      <textarea id="post-content" placeholder="Share something..." required></textarea>
      <button type="submit">Post</button>
    </form>

    <div id="feed"></div>
  </section>

  <!-- RIGHT: Member Discovery -->
  <section class="card" id="discovery-section">
    <h3>Member Discovery</h3>
    <div id="members"></div>
  </section>

</main>

<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';

const supabase = createClient(
  'https://adkljqadhghboezfazxz.supabase.co',
  'sb_publishable_cEo9AM4ZL0T21rG-Fn1RlA_u2nW5vj6'
);

const logoutBtn = document.getElementById('logout-btn');
const feedEl = document.getElementById('feed');
const profileEl = document.getElementById('profile');
const postForm = document.getElementById('post-form');
const membersEl = document.getElementById('members');

let currentUser;

// ---------------- AUTH + GATING ----------------
async function initPortal() {
  const { data: { session } } = await supabase.auth.getSession();

  if (!session) {
    location.href = '/login.html';
    return;
  }

  currentUser = session.user;
  const email = currentUser.email.toLowerCase().trim();

  // ✅ Check approval
  const { data: approved, error: approvalError } = await supabase
    .from('approved_users')
    .select('*')
    .eq('email', email)
    .maybeSingle();

  if (approvalError) {
    console.error("Approval check error:", approvalError);
    location.href = '/login.html';
    return;
  }

  if (!approved) {
    location.href = '/not-approved.html';
    return;
  }

  // ✅ Check onboarding
  const { data: profile, error: profileError } = await supabase
    .from('profiles')
    .select('*')
    .eq('id', currentUser.id)
    .maybeSingle();

  if (!profile || !profile.onboarding_complete) {
    location.href = '/onboarding.html';
    return;
  }

  logoutBtn.hidden = false;

  renderProfile(profile);
  loadFeed();
  loadMembers();
}

// ---------------- PROFILE ----------------
function renderProfile(profile) {
  profileEl.innerHTML = `
    <p><strong>${profile.name}</strong></p>
    <p>${profile.statement || ''}</p>
    <p><em>${profile.focus}</em></p>
    <p>Reputation: ${profile.reputation || 0}</p>
  `;
}

// ---------------- FEED ----------------
async function loadFeed() {
  const { data: posts, error } = await supabase
    .from('posts')
    .select('*, profiles(name, reputation), reactions(*)')
    .order('created_at', { ascending: false });

  if (error) {
    feedEl.innerHTML = '<p>Error loading feed.</p>';
    return;
  }

  if (!posts.length) {
    feedEl.innerHTML = '<p>No posts yet.</p>';
    return;
  }

  feedEl.innerHTML = '';

  posts.forEach(post => {
    const div = document.createElement('div');
    div.className = 'card post-card';
    div.innerHTML = `
      <p><strong>${post.profiles?.name || 'Unknown'}</strong> (${post.profiles?.reputation || 0} rep)</p>
      <p>${post.content}</p>
      <div class="reaction-bar">
        <button class="like-btn" data-post="${post.id}">👍 ${post.reactions?.length || 0}</button>
      </div>
    `;
    feedEl.appendChild(div);
  });

  // Attach reaction listeners
  document.querySelectorAll('.like-btn').forEach(btn => {
    btn.addEventListener('click', async () => {
      const postId = btn.dataset.post;
      const { error } = await supabase.from('reactions').insert([{ post_id: postId, user_id: currentUser.id }]);
      if (!error) loadFeed();
    });
  });
}

// ---------------- POST CREATE ----------------
postForm.addEventListener('submit', async (e) => {
  e.preventDefault();
  const content = document.getElementById('post-content').value.trim();
  if (!content) return;

  const { error } = await supabase.from('posts').insert([{
    content,
    user_id: currentUser.id
  }]);

  if (error) {
    alert('Failed to post');
    return;
  }

  postForm.reset();
  loadFeed();
});

// ---------------- MEMBER DISCOVERY ----------------
async function loadMembers() {
  const { data: members, error } = await supabase
    .from('profiles')
    .select('*')
    .neq('id', currentUser.id)
    .order('reputation', { ascending: false })
    .limit(5);

  if (error) {
    membersEl.innerHTML = '<p>Error loading members.</p>';
    return;
  }

  membersEl.innerHTML = '';

  members.forEach(member => {
    const div = document.createElement('div');
    div.className = 'member-card';
    div.innerHTML = `
      <p><strong>${member.name}</strong> (${member.reputation || 0} rep)</p>
      <p>${member.focus || ''}</p>
      <a href="/profile.html?id=${member.id}">View Profile</a>
    `;
    membersEl.appendChild(div);
  });
}

// ---------------- LOGOUT ----------------
logoutBtn.addEventListener('click', async () => {
  await supabase.auth.signOut();
  location.href = '/login.html';
});

// INIT
initPortal();
</script>

</body>
</html>
