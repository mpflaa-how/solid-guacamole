<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>GFII Portal</title>

<link rel="stylesheet" href="styles.css">
</head>

<body>

<div class="app">

  <!-- SIDEBAR -->
  <aside class="sidebar">

    <h2 class="logo">GFII</h2>

    <nav class="nav">
      <button data-view="home">Home</button>
      <button data-view="members">Members</button>
      <button data-view="events">Events</button>
      <button data-view="profile">Profile</button>
    </nav>

    <hr>

    <!-- Netlify Login -->
    <div data-netlify-identity-menu></div>

  </aside>


  <!-- MAIN -->
  <main class="main">

    <header class="topbar">
      <h2 id="viewTitle">Home</h2>
      <div id="userDisplay">Guest</div>
    </header>


    <!-- HOME -->
    <section id="home" class="view active">
      <div class="card">
        <h3>Welcome to GFII</h3>
        <p>Your private growth environment.</p>
      </div>
    </section>


    <!-- MEMBERS -->
    <section id="members" class="view">
      <div class="card">
        <h3>Member Directory</h3>
        <p>Coming soon.</p>
      </div>
    </section>


    <!-- EVENTS -->
    <section id="events" class="view">
      <div class="card">
        <h3>Events</h3>
        <ul>
          <li>Weekly Growth Call</li>
          <li>Founder Session</li>
        </ul>
      </div>
    </section>


    <!-- PROFILE -->
    <section id="profile" class="view">
      <div class="card">
        <h3>Your Profile</h3>
        <p>Email: <span id="userEmail">—</span></p>
      </div>
    </section>

  </main>

</div>


<!-- Netlify Identity -->
<script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>

<script>
/* =========================
   APP NAVIGATION
========================= */

document.querySelectorAll("[data-view]").forEach(btn => {

  btn.addEventListener("click", () => {

    const id = btn.dataset.view;

    document.querySelectorAll(".view")
      .forEach(v => v.classList.remove("active"));

    document.getElementById(id).classList.add("active");

    document.getElementById("viewTitle").innerText =
      id.charAt(0).toUpperCase() + id.slice(1);

  });

});


/* =========================
   NETLIFY AUTH (SAFE INIT)
========================= */

window.addEventListener("load", () => {

  if (!window.netlifyIdentity) return;

  netlifyIdentity.init();

  netlifyIdentity.on("init", user => updateUser(user));

  netlifyIdentity.on("login", user => {
    updateUser(user);
    netlifyIdentity.close();
  });

  netlifyIdentity.on("logout", () => updateUser(null));

});


function updateUser(user) {

  const display = document.getElementById("userDisplay");
  const email = document.getElementById("userEmail");

  if (!user) {
    display.textContent = "Guest";
    email.textContent = "—";
    return;
  }

  display.textContent =
    user.user_metadata?.full_name || user.email;

  email.textContent = user.email;
}
</script>

</body>
</html>
