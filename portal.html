<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GFII Dashboard</title>
  <link rel="stylesheet" href="styles.css">

  <style>
    .dashboard {
      max-width: 1100px;
      margin: 40px auto;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 24px;
    }

    .card h3 {
      margin-bottom: 16px;
      color: #c9a96e;
      font-size: 0.9rem;
      letter-spacing: 1.5px;
      text-transform: uppercase;
    }

    .profile-name {
      font-size: 1.4rem;
      font-weight: bold;
      margin-bottom: 6px;
    }

    .profile-statement {
      color: #aaa;
      margin-bottom: 10px;
    }

    .badge {
      display: inline-block;
      padding: 6px 10px;
      border-radius: 6px;
      background: rgba(201,169,110,0.15);
      color: #c9a96e;
      font-size: 0.8rem;
    }

    .member {
      padding: 12px 0;
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }

    .member:last-child {
      border-bottom: none;
    }

    .member strong {
      color: #fff;
    }

    .member p {
      margin: 4px 0;
      color: #888;
      font-size: 0.9rem;
    }

    .member a {
      font-size: 0.85rem;
    }

    .status-box {
      font-size: 0.95rem;
      color: #bbb;
      line-height: 1.6;
    }
  </style>
</head>

<body>

<nav class="nav">
  <h1 class="nav-brand">GFII</h1>
  <button id="logout-btn" class="btn-logout" hidden>Log Out</button>
</nav>

<main class="dashboard">

  <!-- PROFILE -->
  <section class="card">
    <h3>Your Identity</h3>
    <div id="profile"></div>
  </section>

  <!-- STATUS -->
  <section class="card">
    <h3>Status</h3>
    <div id="status"></div>
  </section>

  <!-- MEMBERS -->
  <section class="card">
    <h3>Members</h3>
    <div id="members"></div>
  </section>

  <!-- FUTURE ACTIONS -->
  <section class="card">
    <h3>Access</h3>
    <div class="status-box">
      <p>✔ You are an approved member</p>
      <p>✔ Profile initialized</p>
      <p style="margin-top:10px;">More features unlocking soon.</p>
    </div>
  </section>

</main>

<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';

/* =============================
   SUPABASE
============================= */
const supabase = createClient(
  'https://adkljqadhghboezfazxz.supabase.co',
  'sb_publishable_cEo9AM4ZL0T21rG-Fn1RlA_u2nW5vj6'
);

/* =============================
   DOM
============================= */
const logoutBtn = document.getElementById('logout-btn');
const profileEl = document.getElementById('profile');
const statusEl = document.getElementById('status');
const membersEl = document.getElementById('members');

let currentUser = null;

/* =============================
   SAFE REDIRECT
============================= */
function redirect(path) {
  window.location.replace(path);
}

/* =============================
   INIT
============================= */
async function init() {
  try {
    const { data: { session }, error } =
      await supabase.auth.getSession();

    if (error || !session) {
      redirect('/login.html');
      return;
    }

    currentUser = session.user;

    await verifyApproval();
    const profile = await loadProfile();

    renderProfile(profile);
    renderStatus(profile);
    await loadMembers();

    logoutBtn.hidden = false;

  } catch (err) {
    console.error('Init error:', err);
    redirect('/login.html');
  }
}

/* =============================
   APPROVAL CHECK
   (SECURE — uses UID)
============================= */
async function verifyApproval() {

  const { data, error } = await supabase
    .from('approved_users')
    .select('user_id')
    .eq('user_id', currentUser.id)
    .maybeSingle();

  if (error || !data) {
    redirect('/not-approved.html');
    throw new Error('User not approved');
  }
}

/* =============================
   PROFILE LOAD
============================= */
async function loadProfile() {

  const { data: profile, error } = await supabase
    .from('profiles')
    .select('*')
    .eq('id', currentUser.id)
    .maybeSingle();

  if (error || !profile) {
    redirect('/onboarding.html');
    throw new Error('Profile missing');
  }

  if (!profile.onboarding_complete) {
    redirect('/onboarding.html');
    throw new Error('Onboarding incomplete');
  }

  return profile;
}

/* =============================
   RENDER PROFILE
============================= */
function renderProfile(profile) {
  profileEl.innerHTML = `
    <div class="profile-name">${profile.name}</div>
    <div class="profile-statement">${profile.statement || ''}</div>
    <div class="badge">${profile.focus || 'Member'}</div>
  `;
}

/* =============================
   RENDER STATUS
============================= */
function renderStatus(profile) {
  statusEl.innerHTML = `
    <div class="status-box">
      <p><strong>Alias:</strong> ${profile.alias || 'Not set'}</p>
      <p><strong>Focus:</strong> ${profile.focus || '—'}</p>
      <p><strong>Member Since:</strong>
        ${new Date(profile.created_at).toLocaleDateString()}
      </p>
    </div>
  `;
}

/* =============================
   LOAD MEMBERS
============================= */
async function loadMembers() {

  const { data: members, error } = await supabase
    .from('profiles')
    .select('id,name,focus')
    .neq('id', currentUser.id)
    .limit(5);

  if (error || !members?.length) {
    membersEl.innerHTML = '<p>No members yet.</p>';
    return;
  }

  membersEl.innerHTML = members.map(member => `
    <div class="member">
      <strong>${member.name}</strong>
      <p>${member.focus || ''}</p>
      <a href="/profile.html?id=${member.id}">
        View
      </a>
    </div>
  `).join('');
}

/* =============================
   LOGOUT
============================= */
logoutBtn.addEventListener('click', async () => {
  await supabase.auth.signOut();
  redirect('/login.html');
});

/* =============================
   AUTH LISTENER
   (auto logout if session dies)
============================= */
supabase.auth.onAuthStateChange((event) => {
  if (event === 'SIGNED_OUT') {
    redirect('/login.html');
  }
});

/* =============================
   START
============================= */
init();
</script>

</body>
</html>
